<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase + GitHub Pages</title>
    <!-- Подключение модулей Firebase через CDN (BaaS) -->
    <script type="module">
        // Импорт необходимых сервисов Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ======= ВСТАВЬТЕ СВОИ ДАННЫЕ ИЗ FIREBASE =======
       const firebaseConfig = {
  apiKey: "AIzaSyBFVPaJMQv2vYiYaU81aUuafabCN-EOlqM",
  authDomain: "twinnotter-10e0f.firebaseapp.com",
  projectId: "twinnotter-10e0f",
  storageBucket: "twinnotter-10e0f.firebasestorage.app",
  messagingSenderId: "620932316655",
  appId: "1:620932316655:web:b67a31bcdf43545015ca1a",
  measurementId: "G-273LDTXBPQ"
};
        // ===============================================

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Обработчик отправки формы
        document.getElementById("requestForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const statusDiv = document.getElementById("status");

            statusDiv.textContent = "Отправка...";
            statusDiv.style.color = "blue";

            try {
                // Добавление документа в коллекцию "requests" в Firestore
                const docRef = await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    timestamp: new Date().toISOString()
                });
                console.log("Документ добавлен с ID: ", docRef.id);
                statusDiv.textContent = "✅ Данные успешно отправлены в Firebase!";
                statusDiv.style.color = "green";
                document.getElementById("requestForm").reset();
            } catch (error) {
                console.error("Ошибка при добавлении документа: ", error);
                statusDiv.textContent = "❌ Ошибка: " + error.message;
                statusDiv.style.color = "red";
            }
        });
    </script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Отправить заявку</h2>
        <form id="requestForm">
            <input type="text" id="name" placeholder="Ваше имя" required>
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit">Отправить в Firebase</button>
        </form>
        <div id="status"></div>
    </div>
</body>
</html>
