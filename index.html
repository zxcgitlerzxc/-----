<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реактивная лента | Firebase BaaS</title>
    <script type="module">
        // ========== ИМПОРТЫ FIREBASE ==========
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc,
            updateDoc,
            doc,
            onSnapshot,
            query,
            orderBy,
            increment,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ========== КОНФИГ (ЗАМЕНИТЕ НА СВОЙ) ==========
       const firebaseConfig = {
  apiKey: "AIzaSyBFVPaJMQv2vYiYaU81aUuafabCN-EOlqM",
  authDomain: "twinnotter-10e0f.firebaseapp.com",
  projectId: "twinnotter-10e0f",
  storageBucket: "twinnotter-10e0f.firebasestorage.app",
  messagingSenderId: "620932316655",
  appId: "1:620932316655:web:b67a31bcdf43545015ca1a",
  measurementId: "G-273LDTXBPQ"
};

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesRef = collection(db, "messages");
        
        // Запрос с сортировкой: сначала новые
        const q = query(messagesRef, orderBy("timestamp", "desc"));

        // ========== 1. REAL-TIME СЛУШАТЕЛЬ (onSnapshot) ==========
        function subscribeToMessages() {
            const feedDiv = document.getElementById("feed");
            feedDiv.innerHTML = '<div style="text-align:center;">🔄 Загрузка...</div>';
            
            onSnapshot(q, (snapshot) => {
                feedDiv.innerHTML = ""; // Очищаем
                
                if (snapshot.empty) {
                    feedDiv.innerHTML = '<div style="text-align:center;">💬 Нет сообщений. Будьте первым!</div>';
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const messageId = doc.id;
                    const timestamp = data.timestamp?.toDate().toLocaleString() || "только что";
                    
                    // Создаём карточку сообщения
                    const card = document.createElement("div");
                    card.className = "message-card";
                    card.innerHTML = `
                        <div class="message-text">${escapeHtml(data.text)}</div>
                        <div class="message-footer">
                            <span class="timestamp">📅 ${timestamp}</span>
                            <button class="like-btn" data-id="${messageId}">
                                ❤️ <span class="likes-count">${data.likes || 0}</span>
                            </button>
                        </div>
                    `;
                    feedDiv.appendChild(card);
                });
                
                // Вешаем обработчики на кнопки Лайк (после отрисовки)
                document.querySelectorAll(".like-btn").forEach(btn => {
                    btn.removeEventListener("click", handleLike);
                    btn.addEventListener("click", handleLike);
                });
            }, (error) => {
                console.error("Ошибка onSnapshot:", error);
                document.getElementById("feed").innerHTML = 
                    `<div style="color:red;">❌ Ошибка Real-time: ${error.message}</div>`;
            });
        }
        
        // ========== 2. АТОМАРНЫЙ ЛАЙК (increment) ==========
        async function handleLike(event) {
            const btn = event.currentTarget;
            const messageId = btn.getAttribute("data-id");
            const likesSpan = btn.querySelector(".likes-count");
            
            // Оптимистичное обновление (для UX)
            const currentLikes = parseInt(likesSpan.textContent);
            likesSpan.textContent = currentLikes + 1;
            btn.style.opacity = "0.7";
            
            try {
                const messageRef = doc(db, "messages", messageId);
                // Атомарное увеличение на 1 — безопасно при параллельных запросах
                await updateDoc(messageRef, {
                    likes: increment(1)
                });
                console.log(`👍 Лайк на сообщение ${messageId} засчитан атомарно`);
            } catch (error) {
                console.error("❌ Ошибка при лайке:", error);
                // Откат оптимистичного обновления
                likesSpan.textContent = currentLikes;
                alert("Не удалось поставить лайк: " + error.message);
            } finally {
                btn.style.opacity = "1";
            }
        }
        
        // ========== 3. ОТПРАВКА НОВОГО СООБЩЕНИЯ ==========
        document.getElementById("messageForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const textInput = document.getElementById("messageText");
            const text = textInput.value.trim();
            const statusDiv = document.getElementById("status");
            
            if (text === "") {
                statusDiv.textContent = "⚠️ Введите текст сообщения";
                statusDiv.style.color = "orange";
                return;
            }
            
            if (text.length > 500) {
                statusDiv.textContent = "❌ Максимум 500 символов";
                statusDiv.style.color = "red";
                return;
            }
            
            statusDiv.textContent = "Отправка...";
            statusDiv.style.color = "blue";
            
            try {
                await addDoc(messagesRef, {
                    text: text,
                    timestamp: serverTimestamp(), // серверное время
                    likes: 0
                });
                statusDiv.textContent = "✅ Сообщение добавлено!";
                statusDiv.style.color = "green";
                textInput.value = ""; // очищаем
                setTimeout(() => { statusDiv.textContent = ""; }, 2000);
            } catch (error) {
                console.error("Ошибка addDoc:", error);
                statusDiv.textContent = `❌ Firestore rejected: ${error.message}`;
                statusDiv.style.color = "red";
            }
        });
        
        // ========== ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ (XSS защита) ==========
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // Запуск реактивной подписки
        subscribeToMessages();
    </script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f3460; color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 0.8rem; }
        .form-area { padding: 20px; background: #f0f2f5; border-bottom: 1px solid #ddd; }
        textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-family: inherit; resize: vertical; font-size: 14px; }
        button[type="submit"] { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; font-size: 16px; transition: 0.2s; }
        button[type="submit"]:hover { background: #c72a48; }
        #status { margin-top: 10px; font-size: 14px; text-align: center; }
        .feed { padding: 20px; background: white; min-height: 400px; }
        .message-card { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #e94560; transition: 0.2s; }
        .message-text { font-size: 16px; margin-bottom: 10px; word-wrap: break-word; }
        .message-footer { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #666; }
        .like-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 5px 12px; border-radius: 30px; transition: 0.2s; display: flex; gap: 5px; align-items: center; }
        .like-btn:hover { background: #ffe5e5; transform: scale(1.05); }
        .likes-count { font-weight: bold; margin-left: 4px; }
        .timestamp { font-size: 11px; }
        footer { text-align: center; padding: 15px; font-size: 12px; background: #f0f2f5; color: #555; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔥 Реактивная лента (BaaS + Real-time)</h1>
        <p>Firestore | onSnapshot | Атомарные лайки | Security Rules</p>
    </div>
    
    <div class="form-area">
        <form id="messageForm">
            <textarea id="messageText" rows="3" placeholder="Напишите сообщение... (до 500 символов)" maxlength="500"></textarea>
            <button type="submit">📤 Отправить</button>
        </form>
        <div id="status"></div>
    </div>
    
    <div class="feed" id="feed">
        <div style="text-align:center;">🔄 Подключение к Firestore...</div>
    </div>
    
    <footer>
        ⚡ Real-time WebSocket/gRPC | 🔐 Security Rules запрещают delete и edit | ❤️ increment() — атомарно
    </footer>
</div>
</body>
</html>
